<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Chat Bot</title>
    <style>
      :root{--bg:#f4f7fb;--panel:#ffffff;--muted:#6b7280;--accent:#2563eb;--user:#0b72ff}
      
      /* Use dvh (Dynamic Viewport Height) to adapt perfectly to mobile UI elements */
      html,body{height:100dvh;height:100vh;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);overflow:hidden}
      
      .wrap{height:100dvh;height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;box-sizing:border-box}
      
      /* Enforce responsive limits: Clean cards on desktop, seamless fullscreen on mobile devices */
      .chat{width:min(520px,100vw);height:calc(100dvh - 24px);height:calc(100vh - 24px);background:var(--panel);border-radius:12px;box-shadow:0 12px 30px rgba(16,24,40,0.08);display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(16,24,40,0.03);box-sizing:border-box}
      
      /* CRITICAL: Protect the header from shrinking when mobile keyboard triggers */
      .header{padding:14px 18px;border-bottom:1px solid rgba(16,24,40,0.04);display:flex;align-items:center;gap:12px;flex-shrink:0}
      .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
      .title-area{display:flex;flex-direction:column}
      .title{font-weight:700;color:#0f172a;font-size:15px}
      .subtitle{font-size:11px;color:var(--muted)}
      
      .messages{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,rgba(37,99,235,0.03) 0%, rgba(124,58,237,0.02) 100%)}
      .bubble{max-width:85%;padding:12px 16px;border-radius:14px;color:#0f172a;line-height:1.5;box-shadow:0 1px 0 rgba(16,24,40,0.02);word-wrap:break-word;overflow-wrap:break-word;font-size:14px}
      .user{align-self:flex-end;background:linear-gradient(90deg,var(--user),#0366d6);color:#fff;border-bottom-right-radius:8px}
      .assistant{align-self:flex-start;background:#f3f6fb;border:1px solid rgba(16,24,40,0.03)}
      .meta{font-size:11px;color:var(--muted);margin-top:6px}
      
      /* CRITICAL: Enforce flex-shrink 0 to ensure input fields remain locked visible over soft keyboards */
      .composer{padding:12px;border-top:1px solid rgba(16,24,40,0.04);display:flex;gap:8px;align-items:center;background:#fff;flex-shrink:0}
      .spinner{width:16px;height:16px;border:3px solid rgba(0,0,0,0.08);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
      .typing{min-height:48px;display:flex;align-items:center}
      .typing-dots{display:inline-flex;gap:6px}
      .dot{width:8px;height:8px;background:#cbd5e1;border-radius:50%;animation:blink 1s infinite}
      .dot:nth-child(2){animation-delay:0.15s}
      .dot:nth-child(3){animation-delay:0.3s}
      @keyframes blink{0%{opacity:0.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}100%{opacity:0.2;transform:translateY(0)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      .send:disabled{opacity:0.6;cursor:default}
      .input{flex:1;background:#f8fafc;border:1px solid rgba(16,24,40,0.08);padding:12px 14px;border-radius:12px;outline:none;color:#0f172a;font-size:14px;-webkit-appearance:none}
      .input:focus{border-color:var(--accent);background:#fff}
      .send{background:var(--accent);color:#fff;padding:12px 16px;border-radius:12px;border:none;cursor:pointer;font-weight:600;font-size:14px;flex-shrink:0}
      pre{margin:8px 0;background:#eef6ff;padding:10px;border-radius:8px;color:#0b4a6f;white-space:pre-wrap;word-break:break-word}
      .plus-btn{width:42px;height:42px;border-radius:12px;background:#f3f6fb;border:1px solid rgba(16,24,40,0.06);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
      .plus-btn:hover{background:#e8edf5}
      .upload-status{font-size:11px;padding:4px 12px;color:#6b7280;border-top:1px solid rgba(16,24,40,0.04);text-align:center;min-height:20px;flex-shrink:0}
      .upload-status.ok{color:#16a34a}.upload-status.err{color:#dc2626}.upload-status.busy{color:#2563eb}

      /* 📱 MOBILE VIEWPORT MEDIA QUERY OVERRIDE */
      @media (max-width: 600px) {
        .wrap { padding: 0; }
        .chat { width: 100vw; height: 100dvh; height: 100vh; border-radius: 0; border: none; }
        .bubble { max-width: 90%; }
        .composer { padding: 10px 8px; bottom: 0; position: sticky; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="chat" role="application">
        <div class="header">
          <div class="logo">BM</div>
          <div class="title-area">
            <div class="title">Chat Bot</div>
            <div class="subtitle">Smart document Q&A — ask or upload files with Memory</div>
          </div>
        </div>
        <div id="messages" class="messages" aria-live="polite"></div>
        <div class="upload-status" id="uploadStatus"></div>
        <div class="composer">
          <button class="plus-btn" id="plusBtn" type="button" title="Upload PDF or TXT">+</button>
          <input type="file" id="fileInput" accept=".pdf,.txt" style="display:none"/>
          <input id="ques" class="input" placeholder="Ask anything…" autocomplete="off" enterkeyhint="send" />
          <button id="sendBtn" class="send">Send</button>
        </div>
      </div>
    </div>

    <script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('ques');
  const sendBtn = document.getElementById('sendBtn');

  const BACKEND_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
    ? 'http://127.0.0.1:5000' 
    : window.location.origin;

  function el(type, cls, html){ const d = document.createElement(type); if(cls) d.className = cls; if(html!==undefined) d.innerHTML = html; return d }
  function escapeHtml(text){ if(text===null||text===undefined) return ''; return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
  function addUserBubble(text){ const b = el('div','bubble user', escapeHtml(text)); messagesEl.appendChild(b); messagesEl.scrollTop = messagesEl.scrollHeight }
  function addAssistantBubble(htmlContent){ const b = el('div','bubble assistant'); b.innerHTML = htmlContent; messagesEl.appendChild(b); messagesEl.scrollTop = messagesEl.scrollHeight }

  function formatReply(text){
    const paragraphs = String(text).split(/\n{2,}/);
    return paragraphs.map(p => {
      const t = p.trim(); if(!t) return '';
      if(t.startsWith('```')){
        return '<pre>'+escapeHtml(t.replace(/^
```[\w]*\n?/,'').replace(/```$/,''))+'</pre>';
      }
      if(/^[-*]\s/.test(t)){
        return '<ul style="margin:4px 0;padding-left:18px">'+
          t.split('\n').filter(l=>l.trim()).map(i=>'<li>'+escapeHtml(i.replace(/^[-*]\s+/,''))+'</li>').join('')+'</ul>';
      }
      if(/^\d+\.\s/.test(t)){
        return '<ol style="margin:4px 0;padding-left:18px">'+
          t.split('\n').filter(l=>l.trim()).map(i=>'<li>'+escapeHtml(i.replace(/^\d+\.\s+/,''))+'</li>').join('')+'</ol>';
      }
      return '<p style="margin:0 0 8px 0">'+escapeHtml(t).replace(/\n/g,'<br>')+'</p>';
    }).join('');
  }

  async function uploadFile(file){
    const status = document.getElementById('uploadStatus');
    sendBtn.disabled = true;
    input.disabled = true;

    addUserBubble('📎 ' + file.name);

    const loadingBubble = el('div','bubble assistant typing');
    loadingBubble.innerHTML = '<div style="display:flex;align-items:center;gap:12px"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="meta" id="uploadMeta">Uploading...</div></div>';
    messagesEl.appendChild(loadingBubble);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    const stages = ['Uploading...', 'Indexing document...', 'Almost there...', 'Processing vector dimensions...'];
    let stageIdx = 0;
    const metaEl = document.getElementById('uploadMeta');
    const stageTimer = setInterval(() => {
      stageIdx = Math.min(stageIdx + 1, stages.length - 1);
      if(metaEl) metaEl.textContent = stages[stageIdx];
      status.textContent = stages[stageIdx];
      status.className = 'upload-status busy';
    }, 4000);

    status.textContent = 'Uploading ' + file.name + '...';
    status.className = 'upload-status busy';

    const form = new FormData();
    form.append('file', file);

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 600000); 

    try{
      const res = await fetch(`${BACKEND_URL}/upload`, {
        method: 'POST',
        body: form,
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      clearInterval(stageTimer);

      const data = await res.json();
      if(!res.ok) throw new Error(data.error || res.statusText);

      loadingBubble.remove();
      status.textContent = '✓ ' + file.name + ' — ready';
      status.className = 'upload-status ok';
      addAssistantBubble(formatReply(data.reply || ('Document "' + file.name + '" indexed. Ask me anything about it.')));

    }catch(err){
      clearTimeout(timeoutId);
      clearInterval(stageTimer);
      loadingBubble.remove();
      if (err.name === 'AbortError') {
          status.textContent = '✗ Request timed out on the frontend.';
      } else {
          status.textContent = '✗ ' + err.message;
      }
      status.className = 'upload-status err';
      addAssistantBubble('<p style="margin:0;color:#dc2626">Upload failed: ' + escapeHtml(err.message) + '</p>');
    }

    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }

  async function sendRequest(){
    const q = input.value.trim(); if(!q) return; input.value = '';
    addUserBubble(q);

    const loading = el('div','bubble assistant typing');
    loading.innerHTML = '<div style="display:flex;align-items:center;gap:12px"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="meta">Thinking…</div></div><div class="content" style="margin-top:8px;white-space:pre-wrap;"></div>';
    messagesEl.appendChild(loading);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    sendBtn.disabled = true;
    input.disabled = true;

    try{
      const resp = await fetch(`${BACKEND_URL}/add`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({message: q})
      });

      if(!resp.ok){
        loading.innerHTML = '<div class="meta">Network error: '+resp.status+'</div>';
        sendBtn.disabled = false; input.disabled = false;
        return;
      }

      const data = await resp.json();
      loading.remove();
      addAssistantBubble(formatReply(data.reply || ''));

    }catch(err){
      loading.innerHTML = '<div class="meta">Error: '+escapeHtml(err.message)+'</div>';
    }
    sendBtn.disabled = false; input.disabled = false;
  }

  sendBtn.addEventListener('click', sendRequest);
  input.addEventListener('keypress', (e)=>{ if(e.key==='Enter') sendRequest() });
  document.getElementById('plusBtn').addEventListener('click', ()=>{ document.getElementById('fileInput').click(); });
  document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    this.value = null;  
    uploadFile(file);
  });

  addAssistantBubble('<div class="meta">Welcome — ask a question or provide a file path to index.</div>');
</script>
  </body>
</html>
